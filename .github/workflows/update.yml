name: Build All Adblock Lists

on:
  push:
    paths:
      - 'data/**' # data qovluğunda istənilən fayl dəyişəndə işə düşür
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Lists Dinamicly
        run: |
          mkdir -p lists
          
          # data/ qovluğundakı bütün .txt fayllarını dövrə salırıq
          for file in data/*.txt; do
            # Əgər qovluq boşdursa və ya .txt faylı yoxdursa dövrü dayandırır
            [ -e "$file" ] || continue
            
            # Faylın adını götürürük (məsələn: data/adblock360.txt -> adblock360)
            filename=$(basename "$file" .txt)
            
            echo "Processing $filename..."
            
            # Boş sətirləri silir, unikal edir, önünə 0.0.0.0 əlavə edir və lists/ qovluğuna yazır
            grep -v '^$' "$file" | sort -u | sed 's/^/0.0.0.0 /' > "lists/${filename}.hosts"
          done

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # lists/ qovluğunda yaranan bütün yeni .hosts fayllarını əlavə edir
          git add lists/*.hosts
          
          git commit -m "Auto-update all adblock hosts lists" || echo "No changes to commit"
          git push
